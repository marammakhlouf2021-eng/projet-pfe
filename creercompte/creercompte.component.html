<div class="page">
  <div class="card">
    <h2>Créer un compte</h2>
    <p class="subtitle">Remplissez le formulaire — votre demande sera validée par l'admin</p>

    <div *ngIf="succes" class="succes">{{ succes }}</div>
    <div *ngIf="erreur" class="erreur">{{ erreur }}</div>

    <div class="form-grid">
      <div class="form-group">
        <label>Nom *</label>
        <input [(ngModel)]="demande.nom" placeholder="Nom">
      </div>
      <div class="form-group">
        <label>Prénom</label>
        <input [(ngModel)]="demande.prenom" placeholder="Prénom">
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input [(ngModel)]="demande.email" type="email" placeholder="votre@email.com">
      </div>
      <div class="form-group">
        <label>Téléphone</label>
        <input [(ngModel)]="demande.telephone" placeholder="Téléphone">
      </div>
      <div class="form-group">
        <label>Mot de passe *</label>
        <input [(ngModel)]="demande.password" type="password" placeholder="••••••••">
      </div>
      <div class="form-group">
        <label>Confirmer mot de passe *</label>
        <input [(ngModel)]="demande.passwordConfirm" type="password" placeholder="••••••••">
      </div>
      <div class="form-group full">
        <label>Rôle *</label>
        <select [(ngModel)]="demande.role">
          <option value="">Choisir un rôle </option>
          <option value="Professeur">Professeur</option>
          <option value="Administration">Administration</option>
          <option value="Etudiant">Étudiant</option>
        </select>
      </div>
    </div>

    <button class="btn-submit" (click)="soumettre()">Envoyer la demande</button>
    <p class="login-link" [routerLink]="['/']">← Retour à l'accueil</p>
  </div>
</div>
